<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Morimori Stock</title>

  <link rel="stylesheet" href="css/style.css">
</head>


<body>


<header class="header">

  <h1>🥐 Morimori Stock</h1>

  <p>
    Control de inventario
  </p>

</header>



<main class="container">


  <section class="menu">


    <button class="menu-btn" data-section="inventory">
      📦 Inventario
    </button>


    <button class="menu-btn" data-section="production">
      ➕ Producción
    </button>


    <button class="menu-btn" data-section="sales">
      ➖ Venta
    </button>


    <button class="menu-btn" data-section="waste">
      🗑️ Merma
    </button>


    <button class="menu-btn" data-section="history">
      📜 Historial
    </button>


    <button class="menu-btn" data-section="stats">
      📊 Estadísticas
    </button>


    <button class="menu-btn" data-section="products">
      ⚙️ Productos
    </button>


  </section>



  <section id="content">

    <h2>
      Bienvenida a Morimori
    </h2>


    <p>
      Selecciona una opción para comenzar.
    </p>


  </section>



</main>




<!-- Base de datos local -->
<script src="js/storage.js"></script>

<!-- Funciones de la app -->
<script src="js/app.js"></script>


</body>

</html>
